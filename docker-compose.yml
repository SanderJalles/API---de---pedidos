version: '3.8'

services:
  db:
    image: postgres:15
    container_name: jitterbit-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: jitterbit-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:123456@db:5432/postgres"
      JWT_SECRET: "sua_chave_secreta_aqui"
    depends_on:
      - db

volumes:
  postgres_data: